  <metadata>built_by: dominionthedev</metadata>

  <!-- Background (Transparent) -->
  <rect width="1200" height="400" fill="transparent"/>

  <!-- Splash Layer (Ink/Smoke Effect) -->
  <g opacity="0.18">
    <path d="M150,200 Q180,120 250,150 T400,180 T600,140 T800,200 T1000,160 T1100,250 Q1050,350 900,320 T700,300 T500,340 T300,310 T150,250 Z" fill="#1A1A2E"/>
    <path d="M200,180 Q250,100 350,140 T550,160 T750,120 T950,180 T1050,140 Q1000,280 850,260 T650,240 T450,280 T250,250 T200,200 Z" fill="#0F172A"/>
    <circle cx="200" cy="200" r="100" fill="#111827"/>
    <circle cx="900" cy="250" r="80" fill="#111827"/>
    <!-- Subtle Signature "D" in splash -->
    <path d="M1100,350 L1100,370 Q1120,370 1120,360 Q1120,350 1100,350" fill="#22D3EE" opacity="0.05"/>
  </g>

  <!-- Gradient Definitions -->
  <defs>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="20%">
