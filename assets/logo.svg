<svg width="1200" height="400" viewBox="0 0 1200 400" xmlns="http://www.w3.org/2000/svg">

  <!-- Background -->
  <rect width="1200" height="400" fill="#0B0B10"/>

  <!-- Splash Layer -->
  <g opacity="0.18">
    <path d="M120,220 C180,120 260,120 320,220 C380,320 460,320 520,220 C580,120 660,120 720,220 C780,320 860,320 920,220"
          fill="none" stroke="#1A1A2E" stroke-width="60" stroke-linecap="round"/>

    <circle cx="300" cy="140" r="80" fill="#111827"/>
    <circle cx="650" cy="260" r="110" fill="#0F172A"/>
    <circle cx="900" cy="160" r="70" fill="#1F2937"/>
  </g>

  <!-- Icon -->
  <text x="120" y="215" font-size="78">🍡</text>

  <!-- Gradients -->
  <defs>
    <linearGradient id="titleGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FF4FD8"/>
      <stop offset="35%" stop-color="#A855F7"/>
      <stop offset="70%" stop-color="#22D3EE"/>
      <stop offset="100%" stop-color="#F8FAFC"/>
    </linearGradient>

    <linearGradient id="taglineGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FF2E93"/>
      <stop offset="50%" stop-color="#FF5CA8"/>
      <stop offset="100%" stop-color="#FF8AC2"/>
    </linearGradient>
  </defs>

  <!-- Title -->
  <text x="240" y="180"
        font-size="64"
        font-weight="600"
        fill="url(#titleGrad)"
        font-family="Inter, system-ui, sans-serif">
    MushMellow
  </text>

  <!-- Tagline -->
  <text x="242" y="235"
        font-size="20"
        fill="url(#taglineGrad)"
        opacity="0.92"
        font-family="Inter, system-ui, sans-serif">
    Soft workflows. Hard execution.
  </text>

  <!-- Subtle signature dot -->
  <circle cx="1160" cy="380" r="3" fill="#22D3EE" opacity="0.08"/>

</svg>
