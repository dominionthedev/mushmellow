version: 1

name: Mush Example

env:
  GOFLAGS: -mod=readonly

ci:
  compatible: true
  output: junit

mushmellows:

  dev:
    description: Development flow with messages
    puffs:
      - id: greeting
        type: message
        text: Welcome to the Mushmellow dev experience!
      - id: build
        run: go build .
      - id: info
        type: message
        text: Build complete. Ready to puff.
